<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GAVI NEWS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── ESTE FOI O ÚNICO ARQUIVO GERADO POR: CLAUDE CODE ─── */


:root {
  --ink: #1a1208;
  --paper: #f7f2e8;
  --cream: #ede8da;
  --gold: #c8922a;
  --gold-light: #e8b84b;
  --green: #2d5a27;
  --green-mid: #4a7c42;
  --green-light: #e8f0e6;
  --rust: #b84a1e;
  --mist: #8a9b88;
  --score-bg: #f0ead8;
}


html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Source Serif 4', Georgia, serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── GRAIN OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.6;
}

/* ── MASTHEAD ─── */
header {
  background: var(--green);
  color: var(--paper);
  padding: 0;
  position: sticky; top: 0;
  z-index: 100;
  border-bottom: 3px solid var(--gold);
}

.masthead-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 40px;
  border-bottom: 1px solid rgba(232,184,75,0.3);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-light);
}

.masthead-title {
  text-align: center;
  padding: 18px 40px 14px;
}

.masthead-title h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2rem, 5vw, 3.8rem);
  font-weight: 900;
  letter-spacing: -0.01em;
  line-height: 1;
  color: var(--paper);
}

.masthead-title .tagline {
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-top: 4px;
}

.masthead-bottom {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 8px 40px;
  flex-wrap: wrap;
}

.cat-btn {
  background: transparent;
  border: 1px solid rgba(232,184,75,0.3);
  color: var(--gold-light);
  padding: 4px 14px;
  font-family: inherit;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}

.cat-btn:hover, .cat-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--green);
  font-weight: 600;
}

/* ── LAYOUT ─── */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ── STATS BAR ─── */
.stats-bar {
  display: flex;
  gap: 32px;
  padding: 20px 0 28px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 36px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
}

.stat-label {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mist);
  margin-top: 2px;
}

.collect-btn {
  margin-left: auto;
  background: var(--green);
  color: var(--paper);
  border: none;
  padding: 10px 24px;
  font-family: inherit;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  align-self: center;
}

.collect-btn:hover { background: var(--green-mid); }
.collect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── FEATURED STORY ─── */
.featured {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 40px;
  padding-bottom: 40px;
  border-bottom: 1px solid var(--cream);
  margin-bottom: 40px;
  align-items: start;
}

.category-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 8px;
}

.featured-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 3vw, 2.5rem);
  font-weight: 700;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 16px;
}

.featured-summary {
  font-size: 1.05rem;
  line-height: 1.7;
  color: #3d3020;
  max-width: 65ch;
  margin-bottom: 20px;
}

.read-more {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--green);
  text-decoration: none;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  border-bottom: 2px solid var(--green-light);
  padding-bottom: 2px;
  transition: border-color 0.2s;
}

.read-more:hover { border-color: var(--green); }

.featured-sidebar {
  border-left: 1px solid var(--cream);
  padding-left: 40px;
}

.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--score-bg);
  border: 1px solid var(--gold-light);
  border-radius: 3px;
  padding: 4px 10px;
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 10px;
}

.score-fill {
  height: 4px;
  border-radius: 2px;
  background: var(--gold);
  margin-top: 4px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.tag {
  background: var(--green-light);
  color: var(--green);
  padding: 2px 10px;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 2px;
}

/* ── NEWS GRID ─── */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
}

.section-line {
  flex: 1;
  height: 1px;
  background: var(--ink);
}

.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px;
  background: var(--cream);
  border: 1px solid var(--cream);
  margin-bottom: 40px;
}

.news-card {
  background: var(--paper);
  padding: 24px;
  transition: background 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}

.news-card:hover { background: #f0ead8; }

.card-category {
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 8px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.35;
  margin-bottom: 10px;
  color: var(--ink);
}

.card-summary {
  font-size: 0.85rem;
  line-height: 1.6;
  color: #4a3d28;
  margin-bottom: 14px;
  overflow: hidden;
  max-height: calc(1.6em * 3);
}

.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--mist);
}

.score-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  display: inline-block;
  margin-right: 4px;
}

.score-dot.high { background: var(--green); }
.score-dot.mid { background: var(--gold); }

/* ── DIVIDER ORNAMENT ─── */
.ornament {
  text-align: center;
  margin: 32px 0;
  color: var(--gold);
  font-size: 1.2rem;
  letter-spacing: 0.5em;
}

/* ── LOAD MORE ─── */
.load-more-wrap {
  text-align: center;
  padding: 20px 0 40px;
}

.load-more-btn {
  background: transparent;
  border: 2px solid var(--ink);
  color: var(--ink);
  padding: 12px 40px;
  font-family: inherit;
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.load-more-btn:hover {
  background: var(--ink);
  color: var(--paper);
}

/* ── EMPTY / LOADING ─── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--mist);
}

.empty-state .big {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  display: block;
  margin-bottom: 16px;
}

.spinner {
  display: inline-block;
  width: 32px; height: 32px;
  border: 3px solid var(--cream);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--green);
  color: var(--paper);
  padding: 12px 24px;
  border-radius: 3px;
  font-size: 0.85rem;
  z-index: 9998;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

/* ── FOOTER ─── */
footer {
  background: var(--ink);
  color: var(--cream);
  text-align: center;
  padding: 32px;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
}

footer a { color: var(--gold-light); text-decoration: none; }

/* ── RESPONSIVE ─── */
@media (max-width: 768px) {
  .featured { grid-template-columns: 1fr; }
  .featured-sidebar { border-left: none; border-top: 1px solid var(--cream); padding-left: 0; padding-top: 24px; }
  .masthead-top { display: none; }
  main { padding: 24px 16px 60px; }
  .stats-bar { gap: 20px; }
  .collect-btn { margin-left: 0; width: 100%; }
}

/* ── ANIMATIONS ─── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.news-card, .featured { animation: fadeIn 0.5s ease both; }
.news-card:nth-child(2) { animation-delay: 0.05s; }
.news-card:nth-child(3) { animation-delay: 0.10s; }
.news-card:nth-child(4) { animation-delay: 0.15s; }
.news-card:nth-child(5) { animation-delay: 0.20s; }
.news-card:nth-child(6) { animation-delay: 0.25s; }
</style>
</head>
<body>

<!-- MASTHEAD -->
<header>
  <div class="masthead-top">
    <span id="date-display">—</span>
    <span>Curadoria por Inteligência Artificial</span>
    <span id="next-run-display">Próxima coleta: —</span>
  </div>
  <div class="masthead-title">
    <h1>GAVI NEWS</h1>
    <div class="tagline">O canal que só publica o que há de melhor no mundo!</div>
  </div>
  <div class="masthead-bottom" id="categories-nav">
    <button class="cat-btn active" data-cat="">Todas</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-num" id="stat-total">—</span>
      <span class="stat-label">Boas notícias</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="stat-score">—</span>
      <span class="stat-label">Score médio</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="stat-cats">—</span>
      <span class="stat-label">Categorias</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="stat-today">—</span>
      <span class="stat-label">Hoje</span>
    </div>
    <button class="collect-btn" id="collect-btn" onclick="triggerCollect()">
      ▶ Coletar Agora
    </button>
  </div>

  <!-- FEATURED -->
  <div id="featured-section"></div>

  <div class="ornament">✦ ✦ ✦</div>

  <!-- SECTION HEADER -->
  <div class="section-header">
    <span class="section-title">Últimas Boas Notícias</span>
    <span class="section-line"></span>
  </div>

  <!-- GRID -->
  <div class="news-grid" id="news-grid">
    <div style="grid-column:1/-1; padding:60px; text-align:center;">
      <div class="spinner"></div>
      <p style="color:var(--mist);font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;">Carregando notícias...</p>
    </div>
  </div>

  <!-- LOAD MORE -->
  <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="load-more-btn" onclick="loadMore()">Carregar mais notícias</button>
  </div>
</main>

<footer>
  <p>Boas Notícias do Mundo &nbsp;·&nbsp; Powered by <a href="#">GAVI NEWS</a> &nbsp;·&nbsp; Curado por GAVI</p>
</footer>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8000';
let currentPage = 1;
let currentCategory = '';
let hasMore = false;

// ── Utilities ──────────────────────────────────────────────

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
  } catch { return ''; }
}

function scoreClass(s) {
  return s >= 9 ? 'high' : s >= 7.5 ? 'mid' : '';
}

// ── Stats ──────────────────────────────────────────────────

async function loadStats() {
  try {
    const r = await fetch(`${API}/stats`);
    const s = await r.json();
    document.getElementById('stat-total').textContent = s.total_news.toLocaleString('pt-BR');
    document.getElementById('stat-score').textContent = s.avg_positivity_score + '/10';
    document.getElementById('stat-cats').textContent = Object.keys(s.by_category).length;
    document.getElementById('next-run-display').textContent = 'Próxima coleta: ' + (s.next_run || '—');

    // Categories nav
    const nav = document.getElementById('categories-nav');
    Object.keys(s.by_category).forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.cat = cat;
      btn.textContent = `${cat} (${s.by_category[cat]})`;
      btn.onclick = () => switchCategory(cat);
      nav.appendChild(btn);
    });
  } catch {}
}

// ── Categories ─────────────────────────────────────────────

function switchCategory(cat) {
  currentCategory = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  document.getElementById('news-grid').innerHTML = `
    <div style="grid-column:1/-1;padding:40px;text-align:center;">
      <div class="spinner"></div>
    </div>`;
  loadNews(true);
}

// ── News Loading ───────────────────────────────────────────

async function loadNews(reset = false) {
  if (reset) {
    currentPage = 1;
    document.getElementById('featured-section').innerHTML = '';
  }

  try {
    const params = new URLSearchParams({ page: currentPage, per_page: 12 });
    if (currentCategory) params.set('category', currentCategory);

    const r = await fetch(`${API}/news?${params}`);
    const data = await r.json();
    hasMore = data.has_more;

    const grid = document.getElementById('news-grid');

    if (reset && data.items.length === 0) {
      grid.innerHTML = `
        <div style="grid-column:1/-1" class="empty-state">
          <span class="big">🌱</span>
          <p>Nenhuma notícia ainda. Clique em <strong>Coletar Agora</strong> para buscar!</p>
        </div>`;
      return;
    }

    // Featured: primeira notícia
    if (reset && data.items.length > 0) {
      renderFeatured(data.items[0]);
      renderGrid(data.items.slice(1), true);
    } else {
      renderGrid(data.items, false);
    }

    // Count today's news
    const today = new Date().toISOString().slice(0,10);
    const todayCount = data.items.filter(n => n.collected_at?.startsWith(today)).length;
    if (reset) document.getElementById('stat-today').textContent = todayCount;

    document.getElementById('load-more-wrap').style.display = hasMore ? 'block' : 'none';

  } catch (e) {
    document.getElementById('news-grid').innerHTML = `
      <div style="grid-column:1/-1" class="empty-state">
        <p>⚠️ Não foi possível conectar à API. Verifique se o servidor está rodando.</p>
        <small style="margin-top:8px;display:block;color:var(--mist);">python main.py api</small>
      </div>`;
  }
}

function renderFeatured(item) {
  const section = document.getElementById('featured-section');
  const scoreBar = `<div class="score-fill" style="width:${item.positivity_score * 10}%"></div>`;
  const tagsHtml = (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  section.innerHTML = `
    <div class="featured">
      <div class="featured-main">
        <div class="category-label">${item.category} · Destaque</div>
        <h2 class="featured-title">${item.title}</h2>
        <p class="featured-summary">${item.summary}</p>
        <a class="read-more" href="${item.url}" target="_blank" rel="noopener">
          Ler notícia completa →
        </a>
      </div>
      <div class="featured-sidebar">
        <div class="score-badge">
          ✨ Positividade: ${item.positivity_score}/10
        </div>
        ${scoreBar}
        <div style="margin-top:16px;font-size:0.8rem;color:var(--mist);">
          <strong style="color:var(--ink);">Fonte:</strong> ${item.source || 'Desconhecido'}
        </div>
        ${item.published_at ? `<div style="margin-top:6px;font-size:0.75rem;color:var(--mist);">${formatDate(item.published_at)}</div>` : ''}
        <div class="tags" style="margin-top:16px;">${tagsHtml}</div>
        <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--cream);">
          <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);margin-bottom:8px;">Coletado por IA em</div>
          <div style="font-size:0.8rem;">${formatDate(item.collected_at)}</div>
        </div>
      </div>
    </div>`;
}

function renderGrid(items, reset) {
  const grid = document.getElementById('news-grid');
  if (reset) grid.innerHTML = '';

  items.forEach((item, i) => {
    const a = document.createElement('a');
    a.className = 'news-card';
    a.href = item.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.style.animationDelay = `${i * 0.05}s`;
    a.innerHTML = `
      <div class="card-category">${item.category}</div>
      <div class="card-title">${item.title}</div>
      <div class="card-summary">${item.summary}</div>
      <div class="card-meta">
        <span><span class="score-dot ${scoreClass(item.positivity_score)}"></span>${item.positivity_score}/10</span>
        <span>${item.source || ''}</span>
      </div>`;
    grid.appendChild(a);
  });
}

function loadMore() {
  currentPage++;
  loadNews(false);
}

// ── Collect ────────────────────────────────────────────────

async function triggerCollect() {
  const btn = document.getElementById('collect-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Coletando...';
  showToast('Coleta iniciada! Isso pode levar alguns minutos.', 5000);

  try {
    await fetch(`${API}/collect`, { method: 'POST' });
    setTimeout(() => {
      loadStats();
      loadNews(true);
      showToast('✅ Coleta concluída!');
      btn.disabled = false;
      btn.textContent = '▶ Coletar Agora';
    }, 30000); // Aguarda 30s antes de recarregar
  } catch {
    showToast('⚠️ Erro ao iniciar coleta.');
    btn.disabled = false;
    btn.textContent = '▶ Coletar Agora';
  }
}

// ── Init ───────────────────────────────────────────────────

document.getElementById('date-display').textContent = new Date().toLocaleDateString('pt-BR', {
  weekday:'long', day:'2-digit', month:'long', year:'numeric'
});

// "Todas" button
document.querySelector('.cat-btn[data-cat=""]').onclick = () => switchCategory('');

loadStats();
loadNews(true);

// Auto-refresh a cada 5 minutos
setInterval(() => { loadStats(); loadNews(true); }, 300000);
</script>
</body>
</html>
